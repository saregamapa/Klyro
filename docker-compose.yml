version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: klyro
      POSTGRES_USER: klyro
      POSTGRES_PASSWORD: klyro
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  klyro:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: klyro-ai
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file: .env
    environment:
      DATABASE_URL: postgresql://klyro:klyro@db:5432/klyro
      VECTOR_BACKEND: pgvector
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  pgdata:
