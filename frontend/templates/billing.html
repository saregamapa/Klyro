{% extends "base.html" %}
{% block title %}Billing{% endblock %}
{% block content %}
<div class="mx-auto max-w-2xl px-4 py-16">
  <h1 class="text-3xl font-bold text-white">Billing</h1>
  <p class="mt-2 text-slate-400">Manage your Klyro subscription.</p>

  <div id="billing-loading" class="mt-8 text-slate-500">Loading…</div>
  <div id="billing-panel" class="cs-glass mt-8 hidden rounded-2xl p-6">
    <p class="text-sm text-slate-500">Current plan</p>
    <p id="billing-plan" class="mt-1 text-2xl font-semibold capitalize text-white">—</p>
    <p id="billing-status" class="mt-1 text-sm text-slate-400"></p>
    <p id="billing-usage" class="mt-4 text-sm text-slate-300"></p>
    <div class="mt-6 flex flex-wrap gap-3">
      <a href="/pricing" class="rounded-xl border border-slate-600 px-4 py-2 text-sm text-white hover:bg-slate-800">View plans</a>
      <button type="button" id="billing-portal-btn" class="rounded-xl bg-emerald-600 px-4 py-2 text-sm font-medium text-white hover:bg-emerald-500">Manage subscription</button>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/billing.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    if (window.KlyroBilling) window.KlyroBilling.initAccountPage();
  });
</script>
{% endblock %}
