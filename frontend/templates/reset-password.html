{% extends "base.html" %}
{% block title %}Set new password{% endblock %}
{% block content %}
<section class="flex min-h-[calc(100vh-4rem)] items-center justify-center px-4 py-20 sm:px-6">
  <div class="w-full max-w-md">
    <div class="cs-glass-strong rounded-3xl p-8 shadow-card sm:p-10">
      <div class="text-center">
        <a href="/" class="inline-flex items-center gap-2 text-lg font-semibold text-white">
          <span
            class="flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-klyro-cyan via-klyro-violet to-klyro-pink text-sm font-bold text-white"
            >K</span
          >
          Klyro
        </a>
        <h1 class="mt-8 text-2xl font-bold text-white">Choose a new password</h1>
      </div>
      <form id="reset-form" class="mt-8 space-y-5" novalidate>
        <input type="hidden" id="reset-token" value="{{ token | default('') }}" />
        <div>
          <label for="password" class="block text-sm font-medium text-slate-300">New password</label>
          <input
            id="password"
            type="password"
            autocomplete="new-password"
            required
            minlength="8"
            class="mt-1.5 w-full rounded-xl border border-slate-600/80 bg-slate-900/80 px-4 py-3 text-white outline-none focus:border-emerald-500/50 focus:ring-2 focus:ring-emerald-500/30"
          />
        </div>
        <div>
          <label for="password2" class="block text-sm font-medium text-slate-300">Confirm password</label>
          <input
            id="password2"
            type="password"
            autocomplete="new-password"
            required
            minlength="8"
            class="mt-1.5 w-full rounded-xl border border-slate-600/80 bg-slate-900/80 px-4 py-3 text-white outline-none focus:border-emerald-500/50 focus:ring-2 focus:ring-emerald-500/30"
          />
        </div>
        <p id="reset-err" class="hidden text-xs text-red-400"></p>
        <button
          type="submit"
          id="reset-submit"
          class="cs-btn-shine w-full rounded-xl bg-gradient-to-r from-emerald-500 to-emerald-600 py-3.5 text-sm font-semibold text-white shadow-lg shadow-emerald-500/25 transition hover:from-emerald-400 hover:to-emerald-500 disabled:opacity-50"
        >
          Update password
        </button>
      </form>
      <p class="mt-6 text-center text-sm text-slate-400">
        <a href="/login" class="font-medium text-emerald-400 hover:underline">Back to log in</a>
      </p>
    </div>
  </div>
</section>
{% endblock %}
{% block scripts %}
<script>
  document.addEventListener("DOMContentLoaded", function () {
    var params = new URLSearchParams(window.location.search);
    var tokEl = document.getElementById("reset-token");
    if (tokEl && params.get("token")) tokEl.value = params.get("token");

    var form = document.getElementById("reset-form");
    if (!form) return;
    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      var token = document.getElementById("reset-token").value;
      var pw = document.getElementById("password").value;
      var pw2 = document.getElementById("password2").value;
      var err = document.getElementById("reset-err");
      if (err) err.classList.add("hidden");
      if (pw !== pw2) {
        if (err) {
          err.textContent = "Passwords do not match";
          err.classList.remove("hidden");
        }
        return;
      }
      if (!token) {
        if (err) {
          err.textContent = "Invalid or missing reset token";
          err.classList.remove("hidden");
        }
        return;
      }
      var btn = document.getElementById("reset-submit");
      btn.disabled = true;
      try {
        var res = await fetch("/api/v1/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: token, new_password: pw }),
        });
        if (!res.ok) {
          var data = await res.json().catch(function () {
            return {};
          });
          throw new Error(data.detail || "Reset failed");
        }
        window.location.href = "/login";
      } catch (ex) {
        if (err) {
          err.textContent = ex.message || "Reset failed";
          err.classList.remove("hidden");
        }
        btn.disabled = false;
      }
    });
  });
</script>
{% endblock %}
