services:
  - type: web
    name: klyro
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /api/v1/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: "Klyro <noreply@klyro.ai>"
      - key: EMAIL_ENABLED
        value: "true"
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: klyro-db
          property: connectionString
      - key: VECTOR_BACKEND
        value: pgvector
      - key: CORS_ALLOW_ORIGINS
        value: "*"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_AGENCY
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          name: klyro-redis
          type: redis
          property: connectionString

  - type: redis
    name: klyro-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru

databases:
  - name: klyro-db
    plan: starter
    databaseName: klyro
    user: klyro
